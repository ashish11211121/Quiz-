services:
  - type: web
    name: quizzoc-backend
    env: node
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        value: "your_mongodb_atlas_uri_here" # REPLACE WITH PRODUCTION URI
      - key: REDIS_URL
        fromService:
          type: redis
          name: quizzoc-redis
          property: connectionString

  - type: redis
    name: quizzoc-redis
    ipAllowList: [] # only allow internal connections
